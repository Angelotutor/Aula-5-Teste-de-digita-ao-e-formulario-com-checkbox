<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="preconect" href='https://fonts.googleapis.com"' />
    <link rel="preconect" href='https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet" />"' crossorigin="anonymous" />
	<link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form>
      <h1 class="titulo" id="meu-titulo">Bem-vindo de volta</h1>

      <div class="container-input">
        <label for="email">E-mail</label>
        <input type="email" name="email" id="email" />
      </div>

      <div class="container-input">
        <label for="senha">Senha</label>
        <input type="password" name="senha" id="senha" />
      </div>

      <div class="container-checkbox">
        <div class="content-checkbox">
          <input type="checkbox" name="lembrar" id="lembrar" />
          <label for="lembrar">Lembrar-me</label>
        </div>

        <a href="#">Esqueceu a senha?</a>
      </div>

      <button type="submit">Entrar</button>

      <p>Ainda não tem uma conta? <a href="#">Cadastre-se</a></p>
    </form>
  </body>
</html>
