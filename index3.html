<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tela de Login Facebook</title>
    <img src="" alt="" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="Style3.css" />
  </head>
  <body class="flex flex-row h-screen">
    <div
      id="container-esquerdo"
      class="bg-white w-[40%] text-black flex flex-col justify-center items-center gap-5 max-[1280px]:w-full max-[1290px]:h-[40%]"
    >
      <h2 class="text-5xl font-bold">facebook</h2>
      <p class="font-light text-2xl w-[50%] text-center">
        O Facebook ajuda você a se conectar e compartilhar com as pessoas que
        fazem parte da sua vida.
      </p>
    </div>

    <div
      id="container-direito"
      class="w-[60%] flex flex-col justify-center items-center gap-6 max-[1280px]:w-full"
    >
      <form class="flex flex-col w-[60%] gap-5 items-center max-[2000px]:90%">
        <label
          class="bg-gray-200 flex flex-row items-center py-3 px-5 gap-3 text-gray-700 w-full rounded-lg"
        >
          <i class="fa-solid fa-envelope text-2xl"></i>
          <input
            type="email"
            name="email"
            id="email"
            placeholder="Email"
            class="w-full text-2xl p-3 outline-none"
          />
        </label>

        <label
          class="bg-gray-200 flex flex-row items-center py-3 px-5 gap-3 text-gray-700 w-full rounded-lg"
        >
          <i class="fa-solid fa-lock text-2xl"></i>
          <input
            type="password"
            name="Senha"
            id="password"
            placeholder="Password"
            class="w-full text-2xl p-3 outline-none"
          />
        </label>

        <button
          class="bg-[blue] text-white px-20 py-5 text-2xl font-bold uppercase rounded- w-fit cursor-pointer"
        >
          Entrar
        </button>
      </form>

      <p>Crie uma Página para uma celebridade, uma marca ou uma empresa.</p>
    </div>

    <a href="">Esqueçeu a senha?</a>
  </body>
</html>
